<div class="dashboard">

  <h2>Dashboard</h2>

  <div class="cards">
    <div class="card total">
      <h3>Total Students</h3>
      <p>{{ total }}</p>
    </div>
  </div>

  <div class="charts">

    <div class="chart-card">
      <h3>Students by Class</h3>
      <canvas id="classChart"></canvas>
    </div>

    <div class="chart-card">
      <h3>Students by Section</h3>
      <canvas id="sectionChart"></canvas>
    </div>

  </div>

</div>
