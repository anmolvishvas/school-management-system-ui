<h2>Students</h2>

<button (click)="logout()">Logout</button>

<p>Length: {{ students().length }}</p>

@if (students().length > 0) {
  <table border="1">
    <tr>
      <th>ID</th>
      <th>Name</th>
      <th>Class</th>
      <th>Section</th>
    </tr>

    @for (s of students(); track s.id) {
      <tr>
        <td>{{ s.id }}</td>
        <td>{{ s.name }}</td>
        <td>{{ s.class }}</td>
        <td>{{ s.section }}</td>
      </tr>
    }
  </table>
} @else {
  <p>No students found</p>
}
